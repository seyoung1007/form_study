<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>input tag</title>
  </head>
  <body>
    <form>
      <!-- 글자를 입력하는 칸 -->
      <input type="text" placeholder="아이디"/>
      <!-- 비밀번호 입력 -->
      <input type="password" placeholder="비밀번호" name="" id="" />
      <!-- 전화번호 입력 -->
      <input type="tel" placeholder="전화번호" id="" />
      <!-- 숫자만 입력 -->
      <input type="number" placeholder="숫자만 입력" name="" id="" />
      <!-- 인터넷 주소 입력 -->
      <input type="url" placeholder="인터넷 주소 입력" name="" id="" />
      <!-- 검색어 입력 -->
      <input type="search" placeholder="검색어 입력" name="" id="" />
      <!-- 이메일 입력 -->
      <input type="email" placeholder="이메일 입력" name="" id="" />
      <!-- 네모 박스 : 여러개 선택 -->
      <input type="checkbox" name="" id="" />
      <input type="checkbox" name="" id="" />
      <input type="checkbox" name="" id="" />
      <!-- 동그라미 선택 : 하나만 선택 -->
      <input type="radio" placeholder="하나만 선택" name="radio" id="" />
      <input type="radio" placeholder="하나만 선택" name="radio" id="" />
      <input type="radio" placeholder="하나만 선택" name="radio" id="" />
      <!-- 파일을 컴퓨터에서 선택 -->
      <input type="file" placeholder="파일을 선택" id="" />
      <!-- 그냥 버튼(눌러도 아무 일도 안일어남)  -->
      <input type="button"  value="로그인" disabled/>
      <!-- 사진 모양의 버튼 -->
      <input type="image" placeholder="버튼" src="google.png" alt="구글로고" />
      <!-- 화면에는 안 보이지만 몰래 값을 저장하는 칸 -->
      <input type="hidden" name="" />
      <!-- 날짜 선택하는 달력 버튼 -->
      <input type="date" name="" id="" />
      <!-- 날짜랑 시간을 같이 선택 -->
      <input type="datetime-local" name="" id="" />
      <!-- 연도와 월을 선택 -->
      <input type="month" name="" id="" />
      <!-- 몇번째 주 선택 -->
      <input type="week" name="" id="" />
      <!-- 시간 선택 -->
      <input type="time" name="" id="" />
      <!-- 막대를 움직여서 값을 정하는 칸 (볼륨 조정) -->
      <input type="range" name="" id="" />
      <!-- 색깔을 선택하는 칸 -->
      <input type="color" name="" id="" />
      <!-- 작성한 내용을 서버로 보내는 버튼 -->
       <input type="submit" value="회원가입">
       <!-- 입력한 내용을 모두 지우는 버튼 -->
        <input type="reset" value="취소버튼">
        <!-- 글쓰기 -->
         <textarea name="" id=""></textarea>
    </form>
  </body>
</html>
